<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0C" />
    <title>Mycelium</title>
    <style>
      :root { color-scheme: dark; }
      body {
        font-family: -apple-system, system-ui, sans-serif;
        background: #0A0A0C; color: #EAEAEA;
        display: grid; place-items: center; min-height: 100dvh; margin: 0;
        padding: max(1rem, env(safe-area-inset-top)) 1rem max(1rem, env(safe-area-inset-bottom));
        box-sizing: border-box;
      }
      .card { width: 100%; max-width: 360px; }
      h1 { font-size: 1.15rem; color: #C9A227; font-weight: 600; margin: 0 0 .35rem; }
      p { color: #8A8A99; font-size: .85rem; line-height: 1.5; margin: 0 0 1.25rem; }
      label { display: block; font-size: .75rem; color: #8A8A99; margin: 0 0 .35rem; }
      .row { display: flex; align-items: center; gap: .5rem; }
      input {
        flex: 1; box-sizing: border-box; padding: .8rem; font-size: 1rem;
        background: #15151A; border: 1px solid #26262E; border-radius: 10px; color: #EAEAEA;
      }
      .suffix { color: #8A8A99; font-size: .9rem; white-space: nowrap; }
      button {
        width: 100%; margin-top: 1.1rem; padding: .85rem; font-size: 1rem; font-weight: 700;
        background: #C9A227; color: #0A0A0C; border: 0; border-radius: 10px; cursor: pointer;
      }
      button:disabled { opacity: .5; }
      .err { color: #F87171; font-size: .8rem; margin: .6rem 0 0; min-height: 1rem; }
      .hint { color: #5A5A66; font-size: .72rem; margin-top: 1rem; text-align: center; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Connect to your vault</h1>
      <p>Enter your Mycelium handle. Your phone connects to your own private vault — your data never leaves your machine.</p>
      <label for="handle">Handle</label>
      <div class="row">
        <input id="handle" inputmode="text" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="yourname" />
        <span class="suffix">.mycelium.id</span>
      </div>
      <button id="connect" disabled>Connect</button>
      <p class="err" id="err"></p>
      <p class="hint">Pairing by QR from the desktop app is coming. This is the only screen bundled in the app.</p>
    </div>
    <script type="module" src="./pair.js"></script>
  </body>
</html>
