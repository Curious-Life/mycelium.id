name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this PR for the Mycelium multi-agent system. Check for:
            1. Security: command injection, auth bypass, unsafe evals, exposed secrets
            2. Agent safety: delegation loops, unbounded spawns, missing timeouts
            3. Error handling: uncaught promises, missing signal/abort handling
            4. Discord/Telegram: message formatting, rate limits, channel ID leaks
            5. D1/Vectorize: SQL injection, missing parameterization
            6. Test coverage: flag changed code paths without tests
            Be direct. Inline comments on specific issues only.
          claude_args: "--max-turns 5 --model claude-sonnet-4-5-20250929"
