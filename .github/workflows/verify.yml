name: verify

# Runs the full verify suite (14 GO-gated suites) on every PR to main and on
# pushes to the working branch. This is the automated green/red signal for
# reviewers and the gate the autonomous routine wakes on. Tier-1 only — the
# suite passes without the ML stack (real embeddings/clustering are Tier-2 and
# verified on a host where onnxruntime/Ollama are installed).

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - claude/repo-overview-mC69M

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The measurement-layer verify gates (fisher, harmonics, criticality,
      # coherence, behavioral, anchors, cross-scale-coupling, the *-encryption
      # gates, …) spawn pipeline/.venv/bin/python3. They are still Tier-1 — they
      # exercise the AES-GCM crypto + the metric math, NOT the ML clustering
      # stack. Required deps: numpy/scipy/cryptography (core), python-dotenv
      # (cluster.py top-level import, reached by the nomic-embedding gate), and
      # ripser/persim/PyWavelets (the harmonics + §4.24 cross-scale gates seed
      # enough data to actually exercise the persistence-entropy / Haar-wavelet
      # paths, so the otherwise-lazy imports DO execute). NOT needed and
      # deliberately excluded (Tier-2, heavy native wheels, lazy in cluster.py):
      # faiss-cpu / python-igraph / leidenalg / umap-learn / onnxruntime /
      # tokenizers / huggingface-hub. Python 3.12 matches the host-verify env.
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Provision pipeline venv (Tier-1 crypto + metrics deps only)
        run: |
          python3 -m venv pipeline/.venv
          pipeline/.venv/bin/python3 -m pip install --upgrade pip
          pipeline/.venv/bin/python3 -m pip install \
            'numpy>=1.26,<3' 'scipy>=1.11' 'cryptography>=42' \
            'python-dotenv>=1.0' 'ripser>=0.6' 'persim>=0.3' 'PyWavelets>=1.6'

      # Install + BUILD the SvelteKit portal BEFORE the verify suite. verify:app-csp
      # asserts the hardened CSP on the REAL shipped shell (canonical build); without
      # portal-app/build/200.html it falls back to the legacy single-file portal,
      # which has no SPA-fallback route, so the canonical SPA-fallback CSP path goes
      # unverified. Building here makes the gate exercise the actual shipped path.
      - name: Install portal-app dependencies
        run: npm --prefix portal-app ci

      - name: Build portal-app (canonical shell for verify:app-csp)
        run: npm --prefix portal-app run build

      - name: Run verify suite
        run: npm run verify

      # Type-check the SvelteKit portal (svelte-check). Not part of `npm run
      # verify` (that's the backend suite) and previously ungated — which let
      # frontend type errors accumulate. svelte-check exits non-zero on errors
      # only (a11y warnings don't fail the gate).
      - name: Type-check portal-app
        run: npm run portal:check
