name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: node --test 'tests/**/*.test.js'

      - name: Lint check
        run: npx --yes eslint --no-eslintrc --rule '{"no-unused-vars":"warn","no-undef":"error"}' --env node --env es2022 --parser-options=ecmaVersion:2022,sourceType:module lib/*.js mcp/*.js agent-server.js || true

      - name: Security audit
        run: npm audit --audit-level=high || true

      - name: Generate SBOM
        run: npx --yes @cyclonedx/cyclonedx-npm --output-file sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
