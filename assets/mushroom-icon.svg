  <!-- cap: a wide overhanging dome -->
  <path d="M96 296 C96 182 168 122 256 122 C344 122 416 182 416 296 C416 311 403 318 386 318 H126 C109 318 96 311 96 296 Z" fill="url(#cap)"/>

  <!-- spores / spots -->
  <circle cx="206" cy="216" r="17" fill="#FFFFFF" fill-opacity="0.9"/>
  <circle cx="292" cy="196" r="12" fill="#FFFFFF" fill-opacity="0.85"/>
  <circle cx="330" cy="250" r="11" fill="#FFFFFF" fill-opacity="0.75"/>
  <circle cx="246" cy="262" r="9" fill="#FFFFFF" fill-opacity="0.7"/>
</svg>
