<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mycelium">
  <defs>
    <linearGradient id="cap" x1="96" y1="120" x2="416" y2="316" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5B9FE8"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="stem" x1="222" y1="300" x2="290" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F2F2F5"/>
      <stop offset="1" stop-color="#C9C9D2"/>
    </linearGradient>
  </defs>

  <!-- rounded tile so it reads as an app icon / favicon -->
