<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mycelium</title>
<style>
  :root {
    --bg: #14130f; --panel: #1c1b16; --line: #2c2a22; --ink: #ece7da;
    --muted: #9a9485; --accent: #b9a26a; --accent-dim: #6f6444; --bad: #c2603f;
    --good: #7fa86b; --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.55 ui-serif, Georgia, "Times New Roman", serif; }
  header { display: flex; align-items: center; gap: 12px; padding: 14px 22px;
    border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--bg); z-index: 5; }
  .brand { font-size: 20px; letter-spacing: .5px; }
  .brand b { color: var(--accent); font-weight: 600; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); }
  .dot.ok { background: var(--good); } .dot.bad { background: var(--bad); }
  .status { color: var(--muted); font: 12px var(--mono); margin-left: auto; }
  .wrap { display: flex; min-height: calc(100vh - 53px); }
  nav { width: 168px; border-right: 1px solid var(--line); padding: 14px 0; flex-shrink: 0; }
  nav button { display: block; width: 100%; text-align: left; padding: 9px 22px; background: none;
    border: none; color: var(--muted); font: inherit; cursor: pointer; border-left: 2px solid transparent; }
  nav button:hover { color: var(--ink); }
  nav button.active { color: var(--accent); border-left-color: var(--accent); background: var(--panel); }
  main { flex: 1; padding: 26px 32px; max-width: 900px; }
  h2 { font-weight: 500; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
  textarea, input, select { width: 100%; background: var(--panel); color: var(--ink);
    border: 1px solid var(--line); border-radius: 6px; padding: 10px 12px; font: inherit; }
  textarea { min-height: 110px; resize: vertical; font-size: 15px; }
  .row { display: flex; gap: 10px; align-items: center; margin: 12px 0; }
  button.go { background: var(--accent-dim); color: var(--ink); border: 1px solid var(--accent);
    border-radius: 6px; padding: 9px 18px; font: inherit; cursor: pointer; }
  button.go:hover { background: var(--accent); color: #14130f; }
  button.go:disabled { opacity: .5; cursor: default; }
  .out { margin-top: 18px; background: var(--panel); border: 1px solid var(--line);
    border-radius: 8px; padding: 16px 18px; white-space: normal; }
  .out.empty { color: var(--muted); font-style: italic; }
  .out h1,.out h2,.out h3 { color: var(--accent); font-weight: 600; margin: 14px 0 6px; line-height: 1.3; }
  .out h1 { font-size: 18px; } .out h2 { font-size: 16px; } .out h3 { font-size: 14px; }
  .out code { font: 13px var(--mono); background: #000; padding: 1px 5px; border-radius: 4px; color: var(--accent); }
  .out ul { margin: 6px 0; padding-left: 20px; } .out li { margin: 2px 0; }
  .out p { margin: 8px 0; }
  .err { color: var(--bad); }
  .toolsbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  select.tool { max-width: 280px; } label.lbl { color: var(--muted); font-size: 13px; }
  .hint { color: var(--muted); font: 12px var(--mono); margin-top: 6px; }
</style>
</head>
<body>
<header>
  <span class="dot" id="dot"></span>
  <span class="brand">mycelium<b>.</b></span>
  <span class="status" id="status">connecting…</span>
</header>
<div class="wrap">
  <nav id="nav"></nav>
  <main id="main"></main>
</div>

<script>
const TABS = [
  { id: 'home',      label: 'Home' },
  { id: 'capture',   label: 'Capture' },
  { id: 'search',    label: 'Search' },
  { id: 'mindscape', label: 'Mindscape' },
  { id: 'tasks',     label: 'Tasks' },
  { id: 'import',    label: 'Import' },
  { id: 'tools',     label: 'Tools' },
];

// ── API ────────────────────────────────────────────────────────────────────
async function call(tool, args = {}) {
  const r = await fetch(`/api/v1/${tool}`, {
    method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(args),
  });
  const j = await r.json().catch(() => ({ ok: false, error: 'bad response' }));
  if (!j.ok) throw new Error(j.error || `error ${r.status}`);
  return j.result;
}
async function listTools() {
  const r = await fetch('/api/v1/tools');
  return (await r.json()).tools || [];
}

// ── tiny markdown → html (results are markdown strings) ───────────────────────
function esc(s) { return String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }
function md(src) {
  if (src == null) return '';
  const text = typeof src === 'string' ? src : JSON.stringify(src, null, 2);
  const lines = esc(text).split('\n'); let html = ''; let inList = false;
  const inline = s => s
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*]+)\*/g, '$1<em>$2</em>');
  for (const ln of lines) {
    const h = ln.match(/^(#{1,3})\s+(.*)$/);
    const li = ln.match(/^\s*[-*]\s+(.*)$/);
    if (h) { if (inList) { html += '</ul>'; inList = false; } html += `<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`; }
    else if (li) { if (!inList) { html += '<ul>'; inList = true; } html += `<li>${inline(li[1])}</li>`; }
    else if (ln.trim() === '') { if (inList) { html += '</ul>'; inList = false; } }
    else { if (inList) { html += '</ul>'; inList = false; } html += `<p>${inline(ln)}</p>`; }
  }
  if (inList) html += '</ul>';
  return html;
}

// ── render helpers ───────────────────────────────────────────────────────────
const el = (h) => { const d = document.createElement('div'); d.innerHTML = h; return d.firstElementChild; };
function outBox(id = 'out') { return `<div class="out empty" id="${id}">No output yet.</div>`; }
function setOut(node, result, isErr) {
  node.classList.remove('empty');
  if (isErr) { node.innerHTML = `<span class="err">${esc(result)}</span>`; return; }
  node.innerHTML = md(result) || '<span class="empty">(empty result)</span>';
}
async function run(btn, outNode, fn) {
  const old = btn.textContent; btn.disabled = true; btn.textContent = '…';
  try { setOut(outNode, await fn(), false); }
  catch (e) { setOut(outNode, e.message || String(e), true); }
  finally { btn.disabled = false; btn.textContent = old; }
}

// ── views ────────────────────────────────────────────────────────────────────
const main = document.getElementById('main');
const views = {
  home() {
    main.innerHTML = `<h2>Home</h2><div class="sub">Your working context — the first thing an agent loads.</div>
      <div class="row"><button class="go" id="reload">Reload context</button></div>${outBox()}`;
    const out = main.querySelector('#out');
    const load = () => run(main.querySelector('#reload'), out, () => call('getContext', {}));
    main.querySelector('#reload').onclick = load; load();
  },
  capture() {
    main.innerHTML = `<h2>Capture</h2><div class="sub">Save a thought, note, or message into the vault.</div>
      <textarea id="c" placeholder="What's on your mind?"></textarea>
      <div class="row"><button class="go" id="save">Capture</button></div>${outBox()}`;
    const out = main.querySelector('#out');
    main.querySelector('#save').onclick = (e) => {
      const content = main.querySelector('#c').value.trim();
      if (!content) { setOut(out, 'Type something to capture.', true); return; }
      run(e.target, out, async () => { const r = await call('captureMessage', { content, source: 'portal' }); main.querySelector('#c').value = ''; return r; });
    };
  },
  search() {
    main.innerHTML = `<h2>Search</h2><div class="sub">Semantic + keyword search across your whole mindscape.</div>
      <div class="row"><input id="q" placeholder="Search your mind…" /><button class="go" id="go">Search</button></div>${outBox()}`;
    const out = main.querySelector('#out'); const q = main.querySelector('#q');
    const go = (e) => { const query = q.value.trim(); if (!query) return; run(e.target || main.querySelector('#go'), out, () => call('searchMindscape', { query, limit: 10 })); };
    main.querySelector('#go').onclick = go;
    q.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') go(ev); });
    q.focus();
  },
  mindscape() {
    main.innerHTML = `<h2>Mindscape</h2><div class="sub">The shape of your thinking — territories and structure.</div>
      <div class="row"><button class="go" id="struct">Structure</button><button class="go" id="terr">Territories</button></div>${outBox()}`;
    const out = main.querySelector('#out');
    main.querySelector('#struct').onclick = (e) => run(e.target, out, () => call('mindscapeStructure', {}));
    main.querySelector('#terr').onclick = (e) => run(e.target, out, () => call('listTerritories', { limit: 20 }));
    main.querySelector('#struct').click();
  },
  tasks() {
    main.innerHTML = `<h2>Tasks</h2><div class="sub">Captured tasks.</div>
      <div class="row"><input id="t" placeholder="New task…" /><button class="go" id="add">Add</button>
        <button class="go" id="list">List</button></div>${outBox()}`;
    const out = main.querySelector('#out');
    main.querySelector('#add').onclick = (e) => {
      const content = main.querySelector('#t').value.trim(); if (!content) return;
      run(e.target, out, async () => { const r = await call('createTask', { content }); main.querySelector('#t').value = ''; return r; });
    };
    main.querySelector('#list').onclick = (e) => run(e.target, out, () => call('listTasks', {}));
    main.querySelector('#list').click();
  },
  import() {
    main.innerHTML = `<h2>Import</h2><div class="sub">Bring in a lot of data — files (encrypted at rest) or bulk message history.</div>
      <h3 style="color:var(--accent);font-weight:500;margin:8px 0">Files</h3>
      <div id="drop" style="border:1px dashed var(--line);border-radius:8px;padding:22px;text-align:center;color:var(--muted);cursor:pointer">
        Drop a file here, or click to choose. Stored as an encrypted blob + a message.</div>
      <input type="file" id="file" multiple style="display:none" />
      <h3 style="color:var(--accent);font-weight:500;margin:18px 0 8px">Bulk messages</h3>
      <div class="hint">One message per line. Imported in batches of 500 (so very large pastes scale).</div>
      <textarea id="bulk" placeholder="paste a chat/history export — one message per line…"></textarea>
      <div class="row"><input id="src" placeholder="source label (e.g. telegram)" style="max-width:240px" />
        <button class="go" id="imp">Import messages</button></div>${outBox()}`;
    const out = main.querySelector('#out');
    const fileInput = main.querySelector('#file'); const drop = main.querySelector('#drop');

    async function sendFile(f) {
      const qs = `?filename=${encodeURIComponent(f.name)}&type=${encodeURIComponent(f.type || '')}&asMessage=1`;
      const r = await fetch(`/api/v1/upload${qs}`, { method: 'POST', body: f });
      const j = await r.json().catch(() => ({ ok: false, error: 'bad response' }));
      if (!j.ok) throw new Error(j.error || `error ${r.status}`);
      return j.result;
    }
    async function uploadFiles(files) {
      out.classList.remove('empty');
      const list = [...files]; let done = 0; const lines = [];
      for (const f of list) {
        out.innerHTML = md(`Uploading **${done}/${list.length}**…`);
        try { const r = await sendFile(f); lines.push(`- ✓ \`${f.name}\` — ${r.size} bytes (encrypted)`); }
        catch (e) { lines.push(`- ✗ \`${f.name}\` — ${e.message}`); }
        done++;
      }
      out.innerHTML = md(`Uploaded **${done}** file(s):\n${lines.join('\n')}`);
    }
    drop.onclick = () => fileInput.click();
    fileInput.onchange = () => fileInput.files.length && uploadFiles(fileInput.files);
    drop.ondragover = (e) => { e.preventDefault(); drop.style.borderColor = 'var(--accent)'; };
    drop.ondragleave = () => { drop.style.borderColor = 'var(--line)'; };
    drop.ondrop = (e) => { e.preventDefault(); drop.style.borderColor = 'var(--line)'; if (e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files); };

    main.querySelector('#imp').onclick = async (e) => {
      const msgs = main.querySelector('#bulk').value.split('\n').map(s => s.trim()).filter(Boolean);
      if (!msgs.length) { setOut(out, 'Paste at least one line.', true); return; }
      const source = main.querySelector('#src').value.trim() || 'import';
      const btn = e.target; btn.disabled = true; out.classList.remove('empty');
      const CHUNK = 500; let imported = 0;
      try {
        for (let i = 0; i < msgs.length; i += CHUNK) {
          const batch = msgs.slice(i, i + CHUNK).map(content => ({ content, source }));
          await call('importMessages', { messages: batch });
          imported += batch.length;
          out.innerHTML = md(`Imported **${imported} / ${msgs.length}** messages…`);
        }
        out.innerHTML = md(`Done — imported **${imported}** messages from \`${source}\`. They'll be embedded + enriched in the background.`);
        main.querySelector('#bulk').value = '';
      } catch (err) { setOut(out, err.message || String(err), true); }
      finally { btn.disabled = false; }
    };
  },
  async tools() {
    main.innerHTML = `<h2>Tools</h2><div class="sub">Call any of the vault's tools directly.</div>
      <div class="toolsbar"><select class="tool" id="sel"></select><button class="go" id="info">?</button></div>
      <div class="hint" id="schema"></div>
      <textarea id="args" placeholder='{ }'>{}</textarea>
      <div class="row"><button class="go" id="invoke">Invoke</button></div>${outBox()}`;
    const sel = main.querySelector('#sel'); const out = main.querySelector('#out'); const schema = main.querySelector('#schema');
    let tools = [];
    try { tools = await listTools(); } catch { setOut(out, 'Could not list tools.', true); return; }
    tools.sort((a, b) => a.name.localeCompare(b.name));
    sel.innerHTML = tools.map(t => `<option value="${t.name}">${t.name}</option>`).join('');
    const showSchema = () => { const t = tools.find(x => x.name === sel.value); const p = t?.inputSchema?.properties || {}; const req = t?.inputSchema?.required || [];
      schema.textContent = `${t?.description || ''}  ·  args: ${Object.keys(p).map(k => req.includes(k) ? k + '*' : k).join(', ') || '(none)'}`; };
    sel.onchange = showSchema; showSchema();
    main.querySelector('#info').onclick = showSchema;
    main.querySelector('#invoke').onclick = (e) => {
      let args; try { args = JSON.parse(main.querySelector('#args').value || '{}'); }
      catch { setOut(out, 'Args must be valid JSON.', true); return; }
      run(e.target, out, () => call(sel.value, args));
    };
  },
};

// ── nav + status ─────────────────────────────────────────────────────────────
const nav = document.getElementById('nav');
function show(id) {
  [...nav.children].forEach(b => b.classList.toggle('active', b.dataset.id === id));
  (views[id] || views.home)();
  history.replaceState(null, '', '#' + id);
}
TABS.forEach(t => { const b = el(`<button data-id="${t.id}">${t.label}</button>`); b.onclick = () => show(t.id); nav.appendChild(b); });

async function ping() {
  const dot = document.getElementById('dot'); const status = document.getElementById('status');
  try { await call('getContext', { recentMessages: 0 }); dot.className = 'dot ok'; status.textContent = 'vault unlocked · localhost'; }
  catch (e) { dot.className = 'dot bad'; status.textContent = 'server error — is it running?'; }
}
ping();
show((location.hash || '#home').slice(1));
</script>
</body>
</html>
