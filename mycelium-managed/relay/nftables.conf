#!/usr/sbin/nft -f
# nftables.conf — example edge protection for the public frps relay.
#
# Operates purely at L3/4 (it never inspects the TLS payload), so it's fully
# compatible with passthrough. Pair it with the host's free always-on scrubbing
# (Hetzner/OVH). Per-source rate + concurrent-connection caps mean one abusive
# source can't exhaust the relay's FDs and starve other tenants — the per-tenant
# DoS the multitenancy review flagged. TUNE the numbers + lock down SSH for your host.
#
#   sudo nft -f nftables.conf

flush ruleset

table inet mycelium {
  chain input {
    type filter hook input priority filter; policy drop;

    ct state established,related accept
    ct state invalid drop
    iif "lo" accept
    meta l4proto { icmp, ipv6-icmp } accept

    # Admin SSH — RESTRICT the source address in production.
    tcp dport 22 ct state new accept

    # Per-source NEW-connection rate limit on the public ports.
    tcp dport { 443, 7000 } ct state new \
      meter ratemeter { ip saddr limit rate 30/second burst 60 packets } accept
    tcp dport { 443, 7000 } ct state new \
      meter ratemeter6 { ip6 saddr limit rate 30/second burst 60 packets } accept

    # Per-source CONCURRENT-connection cap (a single source can't exhaust FDs).
    tcp dport { 443, 7000 } meter connmeter  { ip saddr  ct count over 128 } drop
    tcp dport { 443, 7000 } meter connmeter6 { ip6 saddr ct count over 128 } drop

    tcp dport { 443, 7000 } accept
  }
}
