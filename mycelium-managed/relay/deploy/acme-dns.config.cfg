# acme-dns (joohoi/acme-dns) — authoritative DNS for auth.<domain> on :53, with the
# HTTP API on loopback only. The Caddy edge fronts ONLY /update publicly; /register
# is reachable solely via 127.0.0.1 (the co-located control-plane), so registration
# is effectively private even though the endpoint itself stays enabled.
#
# Replace yourdomain.com + <BOX_IP>. Mount at /etc/acme-dns/config.cfg.

[general]
listen = "0.0.0.0:53"
protocol = "both"
domain = "auth.yourdomain.com"
nsname = "ns.auth.yourdomain.com"
nsadmin = "admin.yourdomain.com"
# acme-dns answers these for its own zone (so the NS delegation resolves).
records = [
    "auth.yourdomain.com. A <BOX_IP>",
    "auth.yourdomain.com. NS ns.auth.yourdomain.com.",
    "ns.auth.yourdomain.com. A <BOX_IP>",
]

[database]
engine = "sqlite3"
connection = "/var/lib/acme-dns/acme-dns.db"

[api]
# Loopback only — the Caddy edge proxies /update; /register stays private.
ip = "127.0.0.1"
port = "8081"
tls = "none"
disable_registration = false

[logconfig]
loglevel = "info"
